name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # Keep npm in lockstep with release.yml — the bundled npm 10 validates
      # the lockfile differently and has rejected lockfiles npm 11 accepts.
      - name: Update npm
        run: npm install -g npm@latest

      - name: Install
        run: npm ci

      - name: Lint (n8n community-node rules)
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
